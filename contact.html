<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>

:root{
--main-color: rgb(219,151,15);
}

/* BODY */

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:black;
color:white;
}

/* HEADER */

header{
background:black;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #222;
}

header h1{
color:var(--main-color);
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:bold;
}

nav a:hover{
color:var(--main-color);
}

/* CENTER WRAPPER */

.container{
display:flex;
justify-content:center;
align-items:center;
height:90vh;
}

/* CONTACT CARD */

.contact-container{
width:420px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
padding:40px;
border-radius:15px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.1);
}

.contact-container h2{
text-align:center;
margin-bottom:25px;
font-size:32px;
color:var(--main-color);
}

/* INPUT */

.form-group{
margin-bottom:18px;
}

input, textarea{
width:100%;
padding:14px;
border-radius:8px;
border:1px solid #444;
background:#111;
color:white;
font-size:15px;
}

input:focus, textarea:focus{
border-color:var(--main-color);
outline:none;
box-shadow:0 0 8px rgba(219,151,15,0.4);
}

/* ERROR */

.error{
color:red;
font-size:13px;
margin-top:5px;
}

.invalid{
border-color:red;
}

/* BUTTON */

.send-btn{
width:100%;
padding:14px;
background:var(--main-color);
border:none;
border-radius:8px;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.send-btn:hover{
background:white;
color:black;
}

/* BACK */

.go-back{
display:block;
text-align:center;
margin-top:15px;
padding:12px;
background:#222;
color:white;
border-radius:8px;
text-decoration:none;
}

.go-back:hover{
background:var(--main-color);
color:black;
}

/* FOOTER */

footer{
text-align:center;
padding:15px;
font-size:14px;
color:#888;
}

</style>
</head>

<body>

<!-- HEADER -->

<header>
<h1>Car Showroom</h1>
<nav>
<a href="index.html">Home</a>
<a href="cars.html">Cars</a>
</nav>
</header>

<!-- FORM -->

<div class="container">
<div class="contact-container">

<h2>Contact Us</h2>

<form id="contactForm">

<div class="form-group">
<input type="text" id="name" placeholder="Your Name" required>
</div>

<div class="form-group">
<input type="text" id="email" placeholder="Your Email" required>
<div class="error" id="emailError"></div>
</div>

<div class="form-group">
<input type="text" id="phone" placeholder="Phone Number">
<div class="error" id="phoneError"></div>
</div>

<div class="form-group">
<textarea rows="5" id="message" placeholder="Your Message" required></textarea>
</div>

<button type="submit" class="send-btn">Send Message</button>

</form>

<a href="index.html" class="go-back">Go Back</a>

</div>
</div>

<footer>
© 2026 Car Showroom
</footer>

<script>

document.getElementById("contactForm").addEventListener("submit",function(e){

e.preventDefault();

let email=document.getElementById("email");
let phone=document.getElementById("phone");

let emailError=document.getElementById("emailError");
let phoneError=document.getElementById("phoneError");

emailError.innerHTML="";
phoneError.innerHTML="";

let emailPattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
let phonePattern=/^[0-9]{10}$/;

let valid=true;

/* EMAIL */

if(!emailPattern.test(email.value)){
emailError.innerHTML="Enter a valid email address";
email.classList.add("invalid");
valid=false;
}else{
email.classList.remove("invalid");
}

/* PHONE */

if(phone.value!=="" && !phonePattern.test(phone.value)){
phoneError.innerHTML="Phone number must be exactly 10 digits";
phone.classList.add("invalid");
valid=false;
}else{
phone.classList.remove("invalid");
}

/* SUCCESS */

if(valid){
alert("Message sent successfully!");
document.getElementById("contactForm").reset();
}

});

</script>

</body>
</html>
