<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Showroom Home</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

:root{
--main-color: rgb(219,151,15);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

/* BODY */

body{
background:black;
color:white;
}

/* HEADER */

header{
background:black;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #222;
position:fixed;
width:100%;
top:0;
z-index:100;
}

header h1{
color:var(--main-color);
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:bold;
}

nav a:hover{
color:var(--main-color);
}

/* CAROUSEL */

.carousel,
.carousel-inner,
.carousel-item{
height:100vh;
}

.carousel-item{
position:relative;
}

.carousel-item img{
height:100vh;
width:100%;
object-fit:cover;
}

/* DARK OVERLAY */

.carousel-item::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:1;
}

/* CENTER CONTENT */

.home-content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:5;
}

.home-content h2{
font-size:70px;
color:var(--main-color);
font-weight:bold;
text-shadow:2px 2px 20px rgba(0,0,0,0.8);
margin-bottom:20px;
}

/* BUTTON */

.home-btn{
padding:12px 30px;
background:var(--main-color);
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.home-btn:hover{
background:white;
color:black;
}

</style>
</head>

<body>

<!-- HEADER -->

<header>
<h1>Car Showroom</h1>
<nav>
<a href="cars.html">Cars</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<!-- Carousel -->

<div id="carouselExampleAutoplaying" class="carousel slide" data-bs-ride="carousel">

<div class="carousel-inner">

<div class="carousel-item active">
<img src="https://luxurycarsmag.com/wp-content/uploads/2024/08/2024-Rolls-Royce-Phantom.jpg" alt="Rolls Royce">
</div>

<div class="carousel-item">
<img src="https://maseratinet.com/image/cache/catalog/news/11-18-2024/5-ferrari-458-speciale-683x484.jpg" alt="Ferrari">
</div>

<div class="carousel-item">
<img src="https://images.ctfassets.net/1fvlg6xqnm65/3NQ9hok3CKCjIH9vy1jd9v/91b6c2f6f63d93d8f2f010fa7f288452/W17-Render-Homepage-META-2026.jpg" alt="Supercar">
</div>

</div>

<button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="prev">
<span class="carousel-control-prev-icon"></span>
</button>

<button class="carousel-control-next" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="next">
<span class="carousel-control-next-icon"></span>
</button>

</div>

<!-- CENTER TEXT -->

<div class="home-content">
<h2>Luxury Car Showroom</h2>
<button class="home-btn" onclick="location.href='cars.html'">Explore Cars</button>
</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
